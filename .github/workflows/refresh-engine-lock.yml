name: Refresh Engine Lock

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerate package lock from pinned engine
        run: |
          ENGINE_SHA="$(node -p "require('./geek-blog.lock.json').engine.commit")"
          npm run workspace -- update --engine "$ENGINE_SHA"
      - name: Commit regenerated lock and remove helper workflow
        run: |
          rm .github/workflows/refresh-engine-lock.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add geek-blog.lock.json package-lock.json .github/workflows/refresh-engine-lock.yml
          git commit -m "Refresh engine package lock"
          git push origin HEAD:main
