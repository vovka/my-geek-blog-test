name: Deploy Blog

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
      VITE_SITE_PROFILE: ${{ vars.VITE_SITE_PROFILE }}
      VITE_ROBOTS_INDEX: ${{ vars.VITE_ROBOTS_INDEX }}
      VITE_ANALYTICS_ENABLED: ${{ vars.VITE_ANALYTICS_ENABLED }}
      VITE_ANALYTICS_ENVIRONMENT: ${{ vars.VITE_ANALYTICS_ENVIRONMENT }}
      VITE_ANALYTICS_ALLOWED_HOSTS: ${{ vars.VITE_ANALYTICS_ALLOWED_HOSTS }}
      VITE_ANALYTICS_GA4_MEASUREMENT_ID: ${{ vars.VITE_ANALYTICS_GA4_MEASUREMENT_ID }}
      VITE_ANALYTICS_CLARITY_PROJECT_ID: ${{ vars.VITE_ANALYTICS_CLARITY_PROJECT_ID }}
      VITE_ANALYTICS_CONSENT_REQUIRED: ${{ vars.VITE_ANALYTICS_CONSENT_REQUIRED }}
      VITE_ANALYTICS_STORAGE_KEY: ${{ vars.VITE_ANALYTICS_STORAGE_KEY }}
      VITE_ANALYTICS_CONSENT_POLICY_VERSION: ${{ vars.VITE_ANALYTICS_CONSENT_POLICY_VERSION }}
      VITE_ANALYTICS_PRIVACY_PAGE_PATH: ${{ vars.VITE_ANALYTICS_PRIVACY_PAGE_PATH }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Set up the pinned workspace
        run: npm run setup
      - name: Configure Chrome sandbox
        run: |
          sandbox_path="$(find "$HOME/.cache/puppeteer" -type f -name chrome_sandbox -print -quit)"
          test -n "$sandbox_path"
          sudo cp -p "$sandbox_path" /usr/local/sbin/chrome-devel-sandbox
          sudo chown root:root /usr/local/sbin/chrome-devel-sandbox
          sudo chmod 4755 /usr/local/sbin/chrome-devel-sandbox
          echo "CHROME_DEVEL_SANDBOX=/usr/local/sbin/chrome-devel-sandbox" >> "$GITHUB_ENV"
      - name: Build through the pinned workspace
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
