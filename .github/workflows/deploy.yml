name: Deploy Blog

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      BLOG_ENGINE_REF: ${{ vars.BLOG_ENGINE_REF }}
      VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
      VITE_SITE_PROFILE: test
      VITE_ROBOTS_INDEX: "false"
      VITE_ANALYTICS_ENABLED: ${{ vars.VITE_ANALYTICS_ENABLED }}
      VITE_ANALYTICS_ENVIRONMENT: ${{ vars.VITE_ANALYTICS_ENVIRONMENT }}
      VITE_ANALYTICS_ALLOWED_HOSTS: ${{ vars.VITE_ANALYTICS_ALLOWED_HOSTS }}
      VITE_ANALYTICS_GA4_MEASUREMENT_ID: ${{ vars.VITE_ANALYTICS_GA4_MEASUREMENT_ID }}
      VITE_ANALYTICS_CLARITY_PROJECT_ID: ${{ vars.VITE_ANALYTICS_CLARITY_PROJECT_ID }}
      VITE_ANALYTICS_CONSENT_REQUIRED: ${{ vars.VITE_ANALYTICS_CONSENT_REQUIRED }}
      VITE_ANALYTICS_STORAGE_KEY: ${{ vars.VITE_ANALYTICS_STORAGE_KEY }}
      VITE_ANALYTICS_CONSENT_POLICY_VERSION: ${{ vars.VITE_ANALYTICS_CONSENT_POLICY_VERSION }}
      VITE_ANALYTICS_PRIVACY_PAGE_PATH: ${{ vars.VITE_ANALYTICS_PRIVACY_PAGE_PATH }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Setup SSH key for private dependencies
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Fix dependencies to use GitHub references instead of yalc
      - name: Update dependencies for CI
        run: |
          ENGINE_REF="$BLOG_ENGINE_REF"
          if [[ ! "$ENGINE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Set BLOG_ENGINE_REF to the reviewed analytics-capable vovka/blog-engine commit SHA."
            exit 1
          fi
          rm -rf package-lock.json .yalc node_modules
          npm pkg set dependencies.blog-engine="git+ssh://git@github.com/vovka/blog-engine.git#$ENGINE_REF"
          npm pkg set dependencies.blog-enhancer="git+ssh://git@github.com/geek-blog/blog-enhancer.git"
          echo "Updated package.json dependencies"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Process markdown posts
        run: npx blog-engine process

      - name: Build site
        run: npx blog-engine build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
