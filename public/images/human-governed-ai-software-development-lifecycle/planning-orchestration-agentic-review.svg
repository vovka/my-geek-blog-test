<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="t d"><title id="t">Planning, Orchestration, and Agentic Review</title><desc id="d">An orchestrator assigns parallel and sequential workstreams, agents create pull requests, automated tests and independent reviews repeat until a human approves.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#344054"/></marker><style>.title{font:700 40px Arial;fill:#101828}.head{font:700 22px Arial}.txt{font:18px Arial;fill:#101828}.ai{fill:#edf9ee;stroke:#2e8b3c;stroke-width:3}.human{fill:#e8f1ff;stroke:#1769d2;stroke-width:4}.art{fill:#fff7df;stroke:#d48b00;stroke-width:3}.lane{fill:#f8f5ff;stroke:#7f56d9;stroke-width:3;stroke-dasharray:9 6}.infra{fill:#f8fafc;stroke:#667085;stroke-width:3}.line{stroke:#344054;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs><rect width="1600" height="900" fill="white"/><text x="800" y="55" text-anchor="middle" class="title">Planning, Orchestration, and Agentic Review</text><rect x="45" y="330" width="210" height="145" rx="16" class="art"/><text x="150" y="375" text-anchor="middle" class="head" fill="#6f4700">Approved Plan</text><text x="150" y="410" text-anchor="middle" class="txt"><tspan x="150">Project-management</tspan><tspan x="150" dy="24">artifact</tspan></text><rect x="315" y="300" width="240" height="205" rx="18" class="ai"/><text x="435" y="350" text-anchor="middle" class="head" fill="#174d20">Orchestrator Agent</text><text x="435" y="390" text-anchor="middle" class="txt"><tspan x="435">Breaks down work,</tspan><tspan x="435" dy="26">sets dependencies,</tspan><tspan x="435" dy="26">coordinates execution</tspan></text><rect x="620" y="100" width="680" height="290" rx="20" class="lane"/><text x="960" y="138" text-anchor="middle" class="head" fill="#6941c6">Parallel workstreams</text><g transform="translate(655 175)"><rect width="175" height="90" rx="12" class="ai"/><text x="87" y="40" text-anchor="middle" class="head" fill="#174d20">Coding Agent A</text><text x="87" y="68" text-anchor="middle" class="txt">Feature area 1</text><rect y="125" width="175" height="75" rx="12" class="infra"/><text x="87" y="168" text-anchor="middle" class="txt">Branch + PR A</text></g><g transform="translate(870 175)"><rect width="175" height="90" rx="12" class="ai"/><text x="87" y="40" text-anchor="middle" class="head" fill="#174d20">Coding Agent B</text><text x="87" y="68" text-anchor="middle" class="txt">Feature area 2</text><rect y="125" width="175" height="75" rx="12" class="infra"/><text x="87" y="168" text-anchor="middle" class="txt">Branch + PR B</text></g><g transform="translate(1085 175)"><rect width="175" height="90" rx="12" class="ai"/><text x="87" y="40" text-anchor="middle" class="head" fill="#174d20">Coding Agent N</text><text x="87" y="68" text-anchor="middle" class="txt">Independent area</text><rect y="125" width="175" height="75" rx="12" class="infra"/><text x="87" y="168" text-anchor="middle" class="txt">Branch + PR N</text></g><rect x="620" y="430" width="680" height="260" rx="20" fill="#f5f9ff" stroke="#1769d2" stroke-width="3" stroke-dasharray="9 6"/><text x="960" y="468" text-anchor="middle" class="head" fill="#175cd3">Sequential PR stack</text><g transform="translate(680 515)"><rect width="170" height="75" rx="12" class="ai"/><text x="85" y="34" text-anchor="middle" class="head" fill="#174d20">Agent 1</text><text x="85" y="59" text-anchor="middle" class="txt">Foundation</text></g><g transform="translate(875 515)"><rect width="170" height="75" rx="12" class="ai"/><text x="85" y="34" text-anchor="middle" class="head" fill="#174d20">Agent 2</text><text x="85" y="59" text-anchor="middle" class="txt">Depends on 1</text></g><g transform="translate(1070 515)"><rect width="170" height="75" rx="12" class="ai"/><text x="85" y="34" text-anchor="middle" class="head" fill="#174d20">Agent N</text><text x="85" y="59" text-anchor="middle" class="txt">Depends on N−1</text></g><path class="line" d="M255 402H315M555 365L620 245M555 440L620 560M830 265V300M1045 265V300M1260 265V300M850 552H875M1045 552H1070"/><rect x="620" y="735" width="230" height="95" rx="14" class="infra"/><text x="735" y="775" text-anchor="middle" class="head">Automated Tests</text><text x="735" y="805" text-anchor="middle" class="txt">CI, browser, API</text><rect x="900" y="720" width="270" height="125" rx="14" class="ai"/><text x="1035" y="760" text-anchor="middle" class="head" fill="#174d20">Agentic Review Loop</text><text x="1035" y="795" text-anchor="middle" class="txt"><tspan x="1035">Review agent comments</tspan><tspan x="1035" dy="24">Coding agent fixes</tspan></text><rect x="1240" y="720" width="285" height="125" rx="14" class="human"/><text x="1382" y="765" text-anchor="middle" class="head" fill="#0b326d">Human Approval</text><text x="1382" y="800" text-anchor="middle" class="txt"><tspan x="1382">Validate context, intent,</tspan><tspan x="1382" dy="24">tests, and risks</tspan></text><path class="line" d="M960 690V735M850 782H900M1170 782H1240"/><path d="M1035 845V875H735V830" class="line"/><text x="885" y="884" text-anchor="middle" class="txt">Repeat until no actionable comments remain</text></svg>