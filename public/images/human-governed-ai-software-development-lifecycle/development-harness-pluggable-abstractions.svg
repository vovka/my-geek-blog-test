<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="t d"><title id="t">Development Harness and Pluggable Abstractions</title><desc id="d">A shared development harness governs replaceable transcription, planning, coding, review, project-management, source-control, CI, automation, deployment, and observability components.</desc><style>.title{font:700 42px Arial;fill:#101828}.head{font:700 22px Arial}.txt{font:17px Arial;fill:#344054}.harness{fill:#eef4ff;stroke:#175cd3;stroke-width:4}.rule{fill:#fff;stroke:#84adff;stroke-width:2}.card{fill:#fff;stroke:#667085;stroke-width:3}.note{fill:#f9fafb;stroke:#98a2b3;stroke-width:2;stroke-dasharray:8 6}</style><rect width="1600" height="900" fill="white"/><text x="800" y="58" text-anchor="middle" class="title">Development Harness and Pluggable Abstractions</text><rect x="80" y="95" width="1440" height="250" rx="22" class="harness"/><text x="800" y="135" text-anchor="middle" class="head" fill="#1849a9">Development Harness</text><g transform="translate(115 170)"><rect width="205" height="125" rx="14" class="rule"/><text x="102" y="42" text-anchor="middle" class="head" fill="#1849a9">Constitutions</text><text x="102" y="72" text-anchor="middle" class="txt"><tspan x="102">Principles, standards,</tspan><tspan x="102" dy="23">operating norms</tspan></text></g><g transform="translate(345 170)"><rect width="205" height="125" rx="14" class="rule"/><text x="102" y="42" text-anchor="middle" class="head" fill="#1849a9">Guardrails</text><text x="102" y="72" text-anchor="middle" class="txt"><tspan x="102">Security, compliance,</tspan><tspan x="102" dy="23">architecture limits</tspan></text></g><g transform="translate(575 170)"><rect width="205" height="125" rx="14" class="rule"/><text x="102" y="42" text-anchor="middle" class="head" fill="#1849a9">Skills</text><text x="102" y="72" text-anchor="middle" class="txt"><tspan x="102">Reusable tools and</tspan><tspan x="102" dy="23">domain capabilities</tspan></text></g><g transform="translate(805 170)"><rect width="205" height="125" rx="14" class="rule"/><text x="102" y="42" text-anchor="middle" class="head" fill="#1849a9">Hooks</text><text x="102" y="72" text-anchor="middle" class="txt"><tspan x="102">Automation at</tspan><tspan x="102" dy="23">workflow events</tspan></text></g><g transform="translate(1035 170)"><rect width="205" height="125" rx="14" class="rule"/><text x="102" y="42" text-anchor="middle" class="head" fill="#1849a9">Permissions</text><text x="102" y="72" text-anchor="middle" class="txt"><tspan x="102">Least-privilege</tspan><tspan x="102" dy="23">access control</tspan></text></g><g transform="translate(1265 170)"><rect width="205" height="125" rx="14" class="rule"/><text x="102" y="42" text-anchor="middle" class="head" fill="#1849a9">Knowledge</text><text x="102" y="72" text-anchor="middle" class="txt"><tspan x="102">Architecture, docs,</tspan><tspan x="102" dy="23">context, runbooks</tspan></text></g><text x="800" y="395" text-anchor="middle" class="head" fill="#344054">Pluggable abstractions — implementations are replaceable</text><g transform="translate(70 430)"><rect width="270" height="155" rx="15" class="card"/><text x="135" y="38" text-anchor="middle" class="head">Transcription Service</text><text x="135" y="75" text-anchor="middle" class="txt"><tspan x="135">Speech-to-text and</tspan><tspan x="135" dy="23">conversation processing</tspan><tspan x="135" dy="32">Examples: Whisper, cloud STT</tspan></text></g><g transform="translate(370 430)"><rect width="270" height="155" rx="15" class="card"/><text x="135" y="38" text-anchor="middle" class="head">Planning Agent</text><text x="135" y="75" text-anchor="middle" class="txt"><tspan x="135">Analyze architecture,</tspan><tspan x="135" dy="23">decompose and sequence</tspan><tspan x="135" dy="32">Examples: Claude, Codex</tspan></text></g><g transform="translate(670 430)"><rect width="270" height="155" rx="15" class="card"/><text x="135" y="38" text-anchor="middle" class="head">Coding Agent</text><text x="135" y="75" text-anchor="middle" class="txt"><tspan x="135">Implement code, tests,</tspan><tspan x="135" dy="23">branches and pull requests</tspan><tspan x="135" dy="32">Examples: Claude Code, Codex</tspan></text></g><g transform="translate(970 430)"><rect width="270" height="155" rx="15" class="card"/><text x="135" y="38" text-anchor="middle" class="head">Review Agent</text><text x="135" y="75" text-anchor="middle" class="txt"><tspan x="135">Review code, security,</tspan><tspan x="135" dy="23">architecture, and tests</tspan><tspan x="135" dy="32">Examples: custom or hosted</tspan></text></g><g transform="translate(1270 430)"><rect width="270" height="155" rx="15" class="card"/><text x="135" y="38" text-anchor="middle" class="head">Project Management</text><text x="135" y="75" text-anchor="middle" class="txt"><tspan x="135">Track status, priority,</tspan><tspan x="135" dy="23">dependencies, and ownership</tspan><tspan x="135" dy="32">Examples: Jira, Notion, Linear</tspan></text></g><g transform="translate(70 625)"><rect width="270" height="155" rx="15" class="card"/><text x="135" y="38" text-anchor="middle" class="head">Source Control</text><text x="135" y="75" text-anchor="middle" class="txt"><tspan x="135">Repositories, branches,</tspan><tspan x="135" dy="23">commits, and pull requests</tspan><tspan x="135" dy="32">Examples: GitHub, GitLab</tspan></text></g><g transform="translate(370 625)"><rect width="270" height="155" rx="15" class="card"/><text x="135" y="38" text-anchor="middle" class="head">CI/CD Platform</text><text x="135" y="75" text-anchor="middle" class="txt"><tspan x="135">Build, test, validate,</tspan><tspan x="135" dy="23">and deploy changes</tspan><tspan x="135" dy="32">Examples: Actions, GitLab CI</tspan></text></g><g transform="translate(670 625)"><rect width="270" height="155" rx="15" class="card"/><text x="135" y="38" text-anchor="middle" class="head">UI Automation</text><text x="135" y="75" text-anchor="middle" class="txt"><tspan x="135">Browser and desktop</tspan><tspan x="135" dy="23">behavior verification</tspan><tspan x="135" dy="32">Examples: Playwright, Selenium</tspan></text></g><g transform="translate(970 625)"><rect width="270" height="155" rx="15" class="card"/><text x="135" y="38" text-anchor="middle" class="head">Deployment Platform</text><text x="135" y="75" text-anchor="middle" class="txt"><tspan x="135">Temporary, staging,</tspan><tspan x="135" dy="23">and production environments</tspan><tspan x="135" dy="32">Examples: Kubernetes, cloud</tspan></text></g><g transform="translate(1270 625)"><rect width="270" height="155" rx="15" class="card"/><text x="135" y="38" text-anchor="middle" class="head">Observability</text><text x="135" y="75" text-anchor="middle" class="txt"><tspan x="135">Logs, traces, metrics,</tspan><tspan x="135" dy="23">health and feedback</tspan><tspan x="135" dy="32">Examples: Grafana, Datadog</tspan></text></g><rect x="270" y="820" width="1060" height="55" rx="14" class="note"/><text x="800" y="855" text-anchor="middle" class="head" fill="#344054">The harness standardizes agent behavior; the tools can change without changing responsibility boundaries.</text></svg>