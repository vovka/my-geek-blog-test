<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 520" role="img" aria-labelledby="t d"><title id="t">Human-Governed AI Software Development Lifecycle</title><desc id="d">Twelve lifecycle stages with blue human checkpoints, green AI-owned stages, and an amber shared architecture stage.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#344054"/></marker><style>.title{font:700 34px Arial;fill:#101828}.label{font:700 15px Arial}.small{font:13px Arial;fill:#475467}.human{fill:#e8f1ff;stroke:#1769d2;stroke-width:3}.ai{fill:#edf9ee;stroke:#2e8b3c;stroke-width:3}.shared{fill:#fff7df;stroke:#d48b00;stroke-width:3}.arrow{stroke:#344054;stroke-width:3;fill:none;marker-end:url(#a)}.loop{stroke:#667085;stroke-width:2;stroke-dasharray:8 6;fill:none;marker-end:url(#a)}</style></defs><rect width="1800" height="520" fill="white"/><text x="900" y="48" text-anchor="middle" class="title">Human-Governed AI Software Development Lifecycle</text><g transform="translate(25 90)"><g class="human"><rect width="125" height="210" rx="12"/></g><text x="62" y="35" text-anchor="middle" class="label" fill="#0b326d">1. Conversation</text><text x="62" y="75" text-anchor="middle" class="small"><tspan x="62">Customer and</tspan><tspan x="62" dy="20">stakeholders</tspan></text></g><g transform="translate(170 90)"><rect class="ai" width="125" height="210" rx="12"/><text x="62" y="35" text-anchor="middle" class="label" fill="#174d20">2. Transcribe</text><text x="62" y="75" text-anchor="middle" class="small"><tspan x="62">Structure and</tspan><tspan x="62" dy="20">extract intent</tspan></text></g><g transform="translate(315 90)"><rect class="human" width="125" height="210" rx="12"/><text x="62" y="35" text-anchor="middle" class="label" fill="#0b326d">3. Prioritize</text><text x="62" y="75" text-anchor="middle" class="small"><tspan x="62">Approve, reject,</tspan><tspan x="62" dy="20">postpone</tspan></text></g><g transform="translate(460 90)"><rect class="shared" width="125" height="210" rx="12"/><text x="62" y="35" text-anchor="middle" class="label" fill="#6f4700">4. Architecture</text><text x="62" y="75" text-anchor="middle" class="small"><tspan x="62">AI proposes;</tspan><tspan x="62" dy="20">human approves</tspan></text></g><g transform="translate(605 90)"><rect class="ai" width="125" height="210" rx="12"/><text x="62" y="35" text-anchor="middle" class="label" fill="#174d20">5. Plan</text><text x="62" y="75" text-anchor="middle" class="small"><tspan x="62">Decompose tasks</tspan><tspan x="62" dy="20">and PR strategy</tspan></text></g><g transform="translate(750 90)"><rect class="ai" width="125" height="210" rx="12"/><text x="62" y="35" text-anchor="middle" class="label" fill="#174d20">6. Implement</text><text x="62" y="75" text-anchor="middle" class="small"><tspan x="62">Agents create</tspan><tspan x="62" dy="20">code and PRs</tspan></text></g><g transform="translate(895 90)"><rect class="ai" width="125" height="210" rx="12"/><text x="62" y="35" text-anchor="middle" class="label" fill="#174d20">7. Test</text><text x="62" y="75" text-anchor="middle" class="small"><tspan x="62">Unit, integration,</tspan><tspan x="62" dy="20">browser, desktop</tspan></text></g><g transform="translate(1040 90)"><rect class="ai" width="125" height="210" rx="12"/><text x="62" y="35" text-anchor="middle" class="label" fill="#174d20">8. AI Review</text><text x="62" y="75" text-anchor="middle" class="small"><tspan x="62">Review and fix</tspan><tspan x="62" dy="20">until clean</tspan></text></g><g transform="translate(1185 90)"><rect class="human" width="125" height="210" rx="12"/><text x="62" y="35" text-anchor="middle" class="label" fill="#0b326d">9. Accept</text><text x="62" y="75" text-anchor="middle" class="small"><tspan x="62">Validate intent</tspan><tspan x="62" dy="20">and risks</tspan></text></g><g transform="translate(1330 90)"><rect class="ai" width="125" height="210" rx="12"/><text x="62" y="35" text-anchor="middle" class="label" fill="#174d20">10. Stage</text><text x="62" y="75" text-anchor="middle" class="small"><tspan x="62">Merge and deploy</tspan><tspan x="62" dy="20">to staging</tspan></text></g><g transform="translate(1475 90)"><rect class="human" width="125" height="210" rx="12"/><text x="62" y="35" text-anchor="middle" class="label" fill="#0b326d">11. Validate</text><text x="62" y="75" text-anchor="middle" class="small"><tspan x="62">Human staging</tspan><tspan x="62" dy="20">verification</tspan></text></g><g transform="translate(1620 90)"><rect class="ai" width="125" height="210" rx="12"/><text x="62" y="35" text-anchor="middle" class="label" fill="#174d20">12. Release</text><text x="62" y="75" text-anchor="middle" class="small"><tspan x="62">Production and</tspan><tspan x="62" dy="20">monitoring</tspan></text></g><g class="arrow"><path d="M150 195H170"/><path d="M295 195H315"/><path d="M440 195H460"/><path d="M585 195H605"/><path d="M730 195H750"/><path d="M875 195H895"/><path d="M1020 195H1040"/><path d="M1165 195H1185"/><path d="M1310 195H1330"/><path d="M1455 195H1475"/><path d="M1600 195H1620"/></g><path class="loop" d="M1100 315V370H812V315"/><text x="955" y="394" text-anchor="middle" class="small">AI review comments return to implementation</text><path class="loop" d="M1537 315V440H667V315"/><text x="1100" y="468" text-anchor="middle" class="small">Human rejection or staging issues return to planning</text><g transform="translate(650 490)"><rect class="human" width="25" height="18" rx="3"/><text x="35" y="14" class="small">Human checkpoint</text><rect class="ai" x="180" width="25" height="18" rx="3"/><text x="215" y="14" class="small">AI-owned execution</text><rect class="shared" x="390" width="25" height="18" rx="3"/><text x="425" y="14" class="small">Shared proposal / approval</text></g></svg>