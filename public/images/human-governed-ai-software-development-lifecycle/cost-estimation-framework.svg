<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 850" role="img" aria-labelledby="t d"><title id="t">Cost Estimation Framework</title><desc id="d">Fixed costs, variable per-feature costs, role-based model usage, and human oversight combine into estimated cost per feature or day.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#344054"/></marker><style>.title{font:700 42px Arial;fill:#101828}.head{font:700 23px Arial}.txt{font:18px Arial;fill:#344054}.fixed{fill:#eef4ff;stroke:#175cd3;stroke-width:4}.variable{fill:#ecfdf3;stroke:#039855;stroke-width:4}.model{fill:#f4f0ff;stroke:#7f56d9;stroke-width:4}.human{fill:#fff7df;stroke:#d48b00;stroke-width:4}.total{fill:#101828;stroke:#101828;stroke-width:4}.item{fill:#fff;stroke:#98a2b3;stroke-width:2}.line{stroke:#344054;stroke-width:4;fill:none;marker-end:url(#a)}</style></defs><rect width="1500" height="850" fill="white"/><text x="750" y="58" text-anchor="middle" class="title">Cost Estimation Framework</text><g transform="translate(60 105)"><rect width="390" height="430" rx="20" class="fixed"/><text x="195" y="45" text-anchor="middle" class="head" fill="#1849a9">Fixed and semi-fixed costs</text><g transform="translate(35 80)"><rect width="320" height="65" rx="10" class="item"/><text x="160" y="40" text-anchor="middle" class="txt">Workspace and enterprise seats</text><rect y="85" width="320" height="65" rx="10" class="item"/><text x="160" y="125" text-anchor="middle" class="txt">Harness and platform maintenance</text><rect y="170" width="320" height="65" rx="10" class="item"/><text x="160" y="210" text-anchor="middle" class="txt">Internal tools and integrations</text><rect y="255" width="320" height="65" rx="10" class="item"/><text x="160" y="295" text-anchor="middle" class="txt">Storage and logging baseline</text></g></g><g transform="translate(555 105)"><rect width="390" height="430" rx="20" class="model"/><text x="195" y="45" text-anchor="middle" class="head" fill="#6941c6">Role-based model usage</text><g transform="translate(35 80)"><rect width="320" height="65" rx="10" class="item"/><text x="160" y="40" text-anchor="middle" class="txt">Orchestrator model</text><rect y="85" width="320" height="65" rx="10" class="item"/><text x="160" y="125" text-anchor="middle" class="txt">Coding agents</text><rect y="170" width="320" height="65" rx="10" class="item"/><text x="160" y="210" text-anchor="middle" class="txt">Review agents</text><rect y="255" width="320" height="65" rx="10" class="item"/><text x="160" y="295" text-anchor="middle" class="txt">Transcription and processing models</text></g></g><g transform="translate(1050 105)"><rect width="390" height="430" rx="20" class="variable"/><text x="195" y="45" text-anchor="middle" class="head" fill="#027a48">Variable per-feature costs</text><g transform="translate(35 80)"><rect width="150" height="55" rx="10" class="item"/><text x="75" y="34" text-anchor="middle" class="txt">Input tokens</text><rect x="170" width="150" height="55" rx="10" class="item"/><text x="245" y="34" text-anchor="middle" class="txt">Output tokens</text><rect y="70" width="150" height="55" rx="10" class="item"/><text x="75" y="104" text-anchor="middle" class="txt">Cache reads</text><rect x="170" y="70" width="150" height="55" rx="10" class="item"/><text x="245" y="104" text-anchor="middle" class="txt">Agent runs</text><rect y="140" width="150" height="55" rx="10" class="item"/><text x="75" y="174" text-anchor="middle" class="txt">CI minutes</text><rect x="170" y="140" width="150" height="55" rx="10" class="item"/><text x="245" y="174" text-anchor="middle" class="txt">Browser sessions</text><rect y="210" width="150" height="55" rx="10" class="item"/><text x="75" y="244" text-anchor="middle" class="txt">Environments</text><rect x="170" y="210" width="150" height="55" rx="10" class="item"/><text x="245" y="244" text-anchor="middle" class="txt">Observability</text><rect y="280" width="320" height="55" rx="10" class="item"/><text x="160" y="314" text-anchor="middle" class="txt">Human oversight time</text></g></g><g transform="translate(320 610)"><rect width="360" height="105" rx="18" class="human"/><text x="180" y="42" text-anchor="middle" class="head" fill="#6f4700">Human oversight</text><text x="180" y="74" text-anchor="middle" class="txt">Architecture, review, acceptance, release</text></g><g transform="translate(865 590)"><rect width="390" height="145" rx="20" class="total"/><text x="195" y="58" text-anchor="middle" class="head" fill="#fff">Estimated Cost per Feature / Day</text><text x="195" y="94" text-anchor="middle" class="txt" fill="#d0d5dd">Fixed allocation + model usage + execution + oversight</text></g><path class="line" d="M450 320H520V662H865M945 320H990V662H865M1245 535V570H1060V590M680 662H865"/><rect x="355" y="780" width="790" height="45" rx="12" fill="#f9fafb" stroke="#98a2b3" stroke-width="2"/><text x="750" y="810" text-anchor="middle" class="txt">Insert current provider prices and measured usage; optimize for cost per accepted feature, not cost per token.</text></svg>